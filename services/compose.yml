  #   networks:
  #     - retaliq-net
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

volumes:
  mariadb_data:
  postgres_data:
  minio_data:
  # stalwart_data:

networks:
  retaliq-net:
    name: retaliq-net
    driver: bridge
