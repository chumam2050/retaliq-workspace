  #   environment:
  #     RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-retaliq}
  #     RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-retaliq}
  #     RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
  #   volumes:
