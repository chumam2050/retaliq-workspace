[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=/bin/sh -c "umask 0002 && exec php-fpm -F"
user=root
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g 'daemon off;'
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=3

[program:queue-worker]
command=php /var/www/html/artisan queue:work --quiet
autostart=true
autorestart=true
startretries=10
startsecs=5
user=www-data
stdout_logfile=/var/www/html/storage/logs/queue-worker.log
stderr_logfile=/var/www/html/storage/logs/queue-worker-error.log

[program:schedule]
command=php /var/www/html/artisan schedule:work --quiet
autostart=true
autorestart=true
startretries=10
startsecs=5
user=www-data
stdout_logfile=/var/www/html/storage/logs/schedule.log
stderr_logfile=/var/www/html/storage/logs/schedule-error.log

[program:vite]
command=node /var/www/html/node_modules/.bin/vite --host 0.0.0.0
directory=/var/www/html
autostart=true
autorestart=true
startretries=5
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:inertia-ssr]
command=php /var/www/html/artisan inertia:start-ssr
autostart=true
autorestart=true
startretries=10
startsecs=5
user=www-data
stdout_logfile=/var/www/html/storage/logs/inertia-ssr.log
stderr_logfile=/var/www/html/storage/logs/inertia-ssr-error.log
