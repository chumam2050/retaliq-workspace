[PHP]
; Performance
memory_limit = 256M
max_execution_time = 30
max_input_time = 60
upload_max_filesize = 20M
post_max_size = 20M

; Error handling (production)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php_errors.log

; Session
session.gc_maxlifetime = 1440
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = On

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; Realpath cache (TTL 0 = always recheck, needed for bind-mount dev)
realpath_cache_size = 4096K
realpath_cache_ttl = 0

; CLI umask fix — ensures files created by `php artisan` have group-write (664).
; The prepend file checks PHP_SAPI so it only takes effect for CLI, not FPM.
auto_prepend_file = /usr/local/etc/php/php-umask.php
