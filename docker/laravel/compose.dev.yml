services:
    project_name:
        image: 'choerul/laravel'
        container_name: dev.project_name
        build:
            context: '.'
            dockerfile: 'docker/development/Dockerfile'
        restart: no
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT}:${APP_PORT}'
            - '${VITE_PORT}:${VITE_PORT}'
        volumes:
            - '.:/var/www/html'
        networks:
            retaliq-net:
                aliases:
                    - project_name
networks:
    retaliq-net:
        name: retaliq-net
        external: true

