server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;

    # index
    index index.php;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log error;

    # Rate limiting
    limit_req_status 429;
    limit_conn_status 429;

    # Root location
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 10;
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # API rate limiting (if you have API routes)
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_conn addr 20;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        # Security: don't execute PHP from uploads directory
        try_files $uri =404;
        
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        
        # Security parameters
        fastcgi_param PHP_VALUE "open_basedir=/var/www/html:/tmp";
        fastcgi_intercept_errors on;
        
        # Increase timeouts for long-running requests
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        
        # Buffer settings
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
    }

    # Static assets caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }
    
    # Deny access to Laravel sensitive directories
    location ~ ^/(storage|bootstrap|config|database|resources|routes|tests|vendor)/.*$ {
        deny all;
        return 404;
    }
    
    # Deny access to composer and other config files
    location ~ /(composer\.(json|lock)|package\.(json|lock)|phpunit\.xml|artisan|README\.md|\.env.*|\.git.*)$ {
        deny all;
        return 404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
