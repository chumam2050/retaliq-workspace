services:
    project_name-backend:
        env_file: backend/.env
        container_name: dev.project_name-backend
        build:
            context: backend
            dockerfile: Dockerfile
        restart: unless-stopped
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${BACKEND_PORT:-10000}:${BACKEND_PORT:-10000}'
        volumes:
            - ./backend:/usr/src/app
            - /usr/src/app/node_modules
        networks:
            retaliq-net:
                aliases:
                    - project_name-backend

    project_name-frontend:
        container_name: dev.project_name-frontend
        build:
            context: frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        ports:
            - '${FRONTEND_PORT:-11000}:${FRONTEND_PORT:-11000}'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        volumes:
            - ./frontend:/app
            - /app/node_modules
        depends_on:
            - project_name-backend
        networks:
            retaliq-net:
                aliases:
                    - project_name-frontend

networks:
    retaliq-net:
        name: retaliq-net
        external: true
